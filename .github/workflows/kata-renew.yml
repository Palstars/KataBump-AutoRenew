name: 🔄 KataBump Auto Renew

on:
  workflow_dispatch:
  schedule:
    # 每天 UTC 02:30 (北京时间 10:30)
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: kata-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-noto-cjk

      - name: 📚 安装 Python 依赖
        run: pip install playwright

      - name: 🌐 安装 Playwright 浏览器
        run: python -m playwright install chromium

      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ secrets.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 直连模式"
          fi

      - name: ⏳ 随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      - name: 🚀 执行续期
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" python3 kata_renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katabump-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: warn

      - name: ⏱️ 提交时间文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化"
          else
            git commit -m "⏱️ $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
